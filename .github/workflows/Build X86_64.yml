name: Build X86_64 releases

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Select the build device'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - 'armv8'
          - 'nanopi-r4s'
          - 'nanopi-r5s'
          - 'nanopi-r76s'
          - 'x86_64'
      version:
        description: 'Select the build version'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'snapshot-25.12'
      build_type:
        description: 'Select the build type'
        required: true
        default: 'default'
        type: choice
        options:
          - 'default'
          - 'minimal'
          - 'standard'
      ccache:
        description: 'Enable ccache (Use Cache to speed up next build)'
        type: boolean
        default: true
      lan_addr:
        description: 'Setting default LAN address'
        required: true
        default: '192.168.1.10'
        type: string
      mihomo_core:
        description: 'mihomo core type'
        default: 'meta'
        type: choice
        options: ['meta', 'smart']
      gcc_version:
        description: 'GCC version'
        required: true
        default: 'GCC15'
        type: choice
        options:
          - 'GCC14'
          - 'GCC15'
          - 'GCC16'
      root_password:
        description: 'Setting default root password (Optional, No password by default)'
        required: false
        default: ''
        type: string
      build_options:
        description: 'Build options (separate multiple options with spaces)'
        required: false
        default: 'BUILD_FAST=y ENABLE_BPF=y ENABLE_LTO=y ENABLE_LRNG=y ENABLE_MOLD=y KERNEL_CLANG_LTO=y LAN_GATEWAY=192.168.1.1 LAN_DNS=192.168.1.1'
        type: string

jobs:
  build:
    name: Build ${{ github.event.inputs.device }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      continue-on-error: true
      uses: actions/checkout@main
      with:
        path: r4s_build_script

    - name: Setup variables
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        git config --global user.name 'actions'
        git config --global user.email 'action@github.com'
        echo "build_dir=/builder" >> "$GITHUB_ENV"
        [ "${{ github.event.inputs.version }}" = "release" ] && echo "build_version=rc2" >> "$GITHUB_ENV" || echo "build_version=dev" >> "$GITHUB_ENV"
        echo "release_suffix=" >> "$GITHUB_ENV"
        echo "release_name_suffix=" >> "$GITHUB_ENV"
        [ "${{ github.event.inputs.build_type }}" = "minimal" ] && echo "release_suffix=-minimal" >> "$GITHUB_ENV" && echo "release_name_suffix= Minimal" >> "$GITHUB_ENV" || true
        [ "${{ github.event.inputs.build_type }}" = "standard" ] && echo "release_suffix=-standard" >> "$GITHUB_ENV" && echo "release_name_suffix= Standard" >> "$GITHUB_ENV" || true
    
    - name: Show system
      run: |
        echo -e "\n\e[1;32mCPU:\e[0m"
        echo "$(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') ($(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')MHz) x $(grep processor /proc/cpuinfo  | wc -l)"
        echo -e "\n\e[1;32mMemory:\e[0m"
        free -h
        echo -e "\n\e[1;32mStorage:\e[0m"
        df -Th / /mnt
        echo -e "\n\e[1;32mSystem:\e[0m"
        lsb_release -a
        echo -e "\n\e[1;32mKernel:\e[0m"
        uname -a
        echo

    - name: Install Caddy Server
      run: |
        sudo curl -sL -o /usr/bin/caddy https://github.com/sbwml/r4s_build_script/releases/download/caddy/caddy
        sudo chmod 755 /usr/bin/caddy
        echo ":8080 {" > caddyfile
        echo "    root * $(pwd)/r4s_build_script" >> caddyfile
        echo "    file_server browse" >> caddyfile
        echo "}" >> caddyfile
        sudo /usr/bin/caddy start --config caddyfile --adapter caddyfile

    - name: Free disk space
      uses: sbwml/actions@free-disk
      with:
        build-mount-path: /builder

    - name: Build System Setup
      uses: sbwml/actions@openwrt-build-setup

    - name: Install LLVM
      uses: sbwml/actions@install-llvm

    - name: Restore Cached
      if: ${{ github.event.inputs.ccache == 'true' && github.event.inputs.device != 'armv8' && github.event.inputs.device != 'nanopi-r4s' }}
      uses: actions/cache/restore@main
      with:
        path: /builder/.ccache
        key: openwrt-25.12-${{ github.event.inputs.device }}-ccache

    - name: Restore Cached (releases)
      if: ${{ github.event.inputs.ccache == 'true' && (github.event.inputs.device == 'armv8' || github.event.inputs.device == 'nanopi-r4s') }}
      continue-on-error: true
      working-directory: /builder
      run: |
        curl -s https://api.github.com/repos/${{ github.repository }}/releases | grep 'browser_download_url' | grep ccache | grep ${{ github.event.inputs.device }} | awk -F '"' '{print $4}' | grep -v '^$' | xargs -n 1 wget -q
        cat ${{ github.event.inputs.device }}.tar.* | tar -xf - || true
        rm -rf ${{ github.event.inputs.device }}.tar.* || true
        [ -d .ccache ] && cache_size=$(du -sb .ccache | awk '{print $1}') || cache_size=0
        cache_size_mb=$(echo "scale=0; ${cache_size} / (1024 * 1024)" | bc)
        echo "Cache Size: ~${cache_size_mb} MB (${cache_size} B)"
        echo "Cache restored successfully"
        echo "Cache restored from key: ${{ github.event.inputs.device }}"

    - name: Compile OpenWrt
      working-directory: /builder
      id: compile
      continue-on-error: true
      env:
        git_name: zouchanggan
        git_password: ${{ secrets.CLONE_TOKEN }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
      run: |
        export ${{ github.event.inputs.build_options }} LAN="${{ github.event.inputs.lan_addr }}" USE_${{ github.event.inputs.gcc_version }}=y
        export mihomo_core="${{ github.event.inputs.mihomo_core }}"
        [ "${{ github.event.inputs.build_type }}" = "minimal" ] && export MINIMAL_BUILD=y
        [ "${{ github.event.inputs.build_type }}" = "standard" ] && export STD_BUILD=y
        [ "${{ github.event.inputs.ccache }}" = 'true' ] && export ENABLE_CCACHE=y
        [ -n "${{ github.event.inputs.root_password }}" ] && export ROOT_PASSWORD="${{ github.event.inputs.root_password }}"
        bash <(curl -sS http://127.0.0.1:8080/build.sh) "${build_version}" "${{ github.event.inputs.device }}"
        cd openwrt
        if [ "${{ github.event.inputs.version }}" = release ]; then
          tags=OpenWrt-$(git describe --abbrev=0 --tags)
        else
          tags=snapshot-25.12-$(git log -n 1 --date=format:"%Y%m%d" --format="%cd")-$(git log --pretty=format:"%h" -1)
        fi
        echo "latest_release=$tags" >>$GITHUB_ENV

    - name: Extensive logs after a failed compilation
      working-directory: /builder
      if: steps.compile.outcome == 'failure'
      run: |
        cd openwrt
        make V=s

    - name: Delete Cached
      if: ${{ github.event.inputs.ccache == 'true' && github.event.inputs.device != 'armv8' && github.event.inputs.device != 'nanopi-r4s' }}
      continue-on-error: true
      working-directory: /builder
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        gh cache delete openwrt-25.12-${{ github.event.inputs.device }}-ccache || true

    - name: Save Cached
      if: ${{ github.event.inputs.ccache == 'true' && github.event.inputs.device != 'armv8' && github.event.inputs.device != 'nanopi-r4s' }}
      continue-on-error: true
      uses: actions/cache/save@main
      with:
        path: /builder/.ccache
        key: openwrt-25.12-${{ github.event.inputs.device }}-ccache

    - name: Create ccache tar files
      if: ${{ github.event.inputs.ccache == 'true' && (github.event.inputs.device == 'armv8' || github.event.inputs.device == 'nanopi-r4s') }}
      continue-on-error: true
      working-directory: /builder
      run: |
        mkdir -p ccache
        tar cf - .ccache | split -d -b 1800m - ccache/${{ github.event.inputs.device }}.tar.

    - name: Upload Cached (releases - ccache)
      if: ${{ github.event.inputs.ccache == 'true' && (github.event.inputs.device == 'armv8' || github.event.inputs.device == 'nanopi-r4s') }}
      continue-on-error: true
      uses: ncipollo/release-action@main
      with:
        name: ccache
        allowUpdates: true
        tag: ccache
        commit: master
        replacesArtifacts: true
        prerelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          ${{ env.build_dir }}/ccache/*

    - name: Prepare Firmware Files
      working-directory: /builder
      run: |
        mkdir -p rom info
        if [[ "${{ github.event.inputs.device }}" == nanopi-* ]]; then
          cp -a openwrt/bin/targets/rockchip/*/*.img.gz rom/
          cp -a openwrt/bin/targets/rockchip/*/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/rockchip/*/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *gz > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.device }}" = "x86_64" ]; then
          cp -a openwrt/bin/targets/x86/*/*-ext4-combined-efi.img.gz rom/
          cp -a openwrt/bin/targets/x86/*/*-squashfs-combined-efi.img.gz rom/
          cp -a openwrt/bin/targets/x86/*/*-generic-rootfs.tar.gz rom/
          cp -a openwrt/bin/targets/x86/*/*-x86-64-generic.manifest info/manifest.txt
          cp -a openwrt/bin/targets/x86/*/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *gz > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.device }}" = "armv8" ]; then
          tar zcf rom/u-boot-qemu_armv8.tar.gz -C openwrt/bin/targets/armsr/armv8*/ ./u-boot-qemu_armv8
          cp -a openwrt/bin/targets/armsr/armv8*/*-generic-initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/armsr/armv8*/*-generic-kernel.bin rom/
          cp -a openwrt/bin/targets/armsr/armv8*/*-generic-ext4-combined-efi.img.gz rom/
          cp -a openwrt/bin/targets/armsr/armv8*/*-generic-squashfs-combined-efi.img.gz rom/
          cp -a openwrt/bin/targets/armsr/armv8*/*-rootfs.tar.gz rom/
          cp -a openwrt/bin/targets/armsr/armv8*/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/armsr/armv8*/config.buildinfo info/config.buildinfo
          cd rom && sha256sum * > ../info/sha256sums.txt
        fi
        
    - name: Generate release info
      working-directory: /builder
      env:
        INFO_DIR: /builder/info
        OPENWRT_VERSION: ${{ env.latest_release }}
        DEVICE: ${{ github.event.inputs.device }}
        WEB_SERVER: unknown
        MIHOMO_CORE: ${{ github.event.inputs.mihomo_core }}
        GCC_VERSION: ${{ github.event.inputs.gcc_version }}
        LAN_ADDR: ${{ github.event.inputs.lan_addr }}
        ROOT_PASSWORD: ${{ github.event.inputs.root_password }}
        BUILD_OPTIONS: ${{ github.event.inputs.build_options }} BUILD_TYPE=${{ github.event.inputs.build_type }}
        RELEASE_TITLE: ${{ env.latest_release }}${{ env.release_name_suffix }}
      run: |
        set -e
        export BUILD_TIME="$(date '+%Y-%m-%d %H:%M:%S %Z')"
        config_file="/builder/info/config.buildinfo"
        manifest_file="/builder/info/manifest.txt"
        selected_gcc="${GCC_VERSION:-${{ github.event.inputs.gcc_version }}}"
        if [ -f "${config_file}" ]; then
          detected_kernel="$(sed -nE 's/^CONFIG_LINUX_([0-9]+)_([0-9]+)=y$/\1.\2/p' "${config_file}" | head -1 || true)"
          detected_gcc="$(grep -E '^CONFIG_GCC_VERSION=' "${config_file}" | cut -d '"' -f2 | head -1 || true)"
          if [ -z "${detected_gcc}" ]; then
            detected_gcc="$(sed -nE 's/^CONFIG_GCC_VERSION_([0-9]+)=y$/GCC\1/p' "${config_file}" | head -1 || true)"
          fi
          [ -n "${detected_kernel}" ] && export KERNEL_VERSION="${detected_kernel}"
          [ -n "${detected_gcc}" ] && export GCC_VERSION="${detected_gcc}" || export GCC_VERSION="${selected_gcc}"
        fi
        if [ -f "${manifest_file}" ]; then
          manifest_kernel="$(awk '$1 == "kernel" && $2 == "-" {print $3; exit}' "${manifest_file}" | sed -E 's/[~-].*$//' || true)"
          [ -z "${KERNEL_VERSION:-}" ] && [ -n "${manifest_kernel}" ] && export KERNEL_VERSION="${manifest_kernel}"
          if grep -Eq '^(nginx|nginx-ssl|luci-ssl-nginx) - ' "${manifest_file}"; then
            export WEB_SERVER="nginx"
          elif grep -Eq '^(uhttpd|uhttpd-mod-ubus|luci-ssl|luci-ssl-openssl) - ' "${manifest_file}"; then
            export WEB_SERVER="uhttpd"
          else
            export WEB_SERVER="unknown"
          fi
          plugin_status() {
            local package_pattern="$1"
            if grep -Eq "^(${package_pattern}) - " "${manifest_file}"; then
              echo "true"
            else
              echo "false"
            fi
          }
          export PLUGINS="\
          Docker=$(plugin_status 'dockerd|docker|luci-app-dockerman') \
          PassWall=$(plugin_status 'luci-app-passwall|luci-app-passwall2') \
          OpenClash=$(plugin_status 'luci-app-openclash') \
          Mihomo_Nikki=$(plugin_status 'luci-app-mihomo|luci-app-nikki') \
          MosDNS=$(plugin_status 'luci-app-mosdns|mosdns') \
          adguardhome=$(plugin_status 'luci-app-adguardhome|adguardhome') \
          OpenAppFilter=$(plugin_status 'luci-app-oaf|oaf') \
          UPnP=$(plugin_status 'luci-app-upnp|miniupnpd') \
          TTYD终端=$(plugin_status 'luci-app-ttyd|ttyd') \
          Argon主题=$(plugin_status 'luci-theme-argon')"
        fi
        export KERNEL_VERSION="${KERNEL_VERSION:-unknown}"
        export GCC_VERSION="${GCC_VERSION:-${selected_gcc:-unknown}}"
        export WEB_SERVER="${WEB_SERVER:-unknown}"
        chmod +x "${GITHUB_WORKSPACE}/r4s_build_script/openwrt/scripts/gen-release-info.sh"
        "${GITHUB_WORKSPACE}/r4s_build_script/openwrt/scripts/gen-release-info.sh"
        cat /builder/info/summary.md >> "$GITHUB_STEP_SUMMARY"
        
    - name: Upload artifacts
      uses: actions/upload-artifact@main
      with:
        name: ${{ github.event.inputs.device }}-openwrt-${{ env.latest_release }}${{ env.release_suffix }}
        path: |
          ${{ env.build_dir }}/rom/*
          ${{ env.build_dir }}/info/*

    - name: Create release
      continue-on-error: true
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.latest_release }}${{ env.release_name_suffix }}
        allowUpdates: true
        tag: ${{ env.latest_release }}${{ env.release_suffix }}
        commit: ${{ github.ref_name }}
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        bodyFile: ${{ env.build_dir }}/info/info.md
        artifacts: ${{ env.build_dir }}/rom/*
